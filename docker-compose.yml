services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "${BACKEND_LOCAL_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj
    networks:
      - webapp-network

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "${FRONTEND_LOCAL_PORT:-5173}:5173"
    environment:
      - REACT_APP_API_URL=http://backend:8080/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - webapp-network

networks:
  webapp-network:
    driver: bridge
